<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Orbital Rings -->
  <ellipse cx="100" cy="100" rx="72" ry="28" fill="none" stroke="url(#orbitGrad)" stroke-width="2.5" stroke-dasharray="6,4" transform="rotate(-28 100 100)"/>
  <ellipse cx="100" cy="100" rx="76" ry="32" fill="none" stroke="rgba(56,189,248,0.3)" stroke-width="1.5" transform="rotate(35 100 100)"/>

  <!-- Earth Globe Mesh -->
  <circle cx="100" cy="105" r="46" fill="none" stroke="rgba(56,189,248,0.25)" stroke-width="1.5"/>
  <path d="M 54 105 A 46 22 0 0 0 146 105 A 46 22 0 0 0 54 105" fill="none" stroke="rgba(56,189,248,0.35)" stroke-width="1.2"/>
  <path d="M 100 59 A 22 46 0 0 0 100 151 A 22 46 0 0 0 100 59" fill="none" stroke="rgba(56,189,248,0.35)" stroke-width="1.2"/>

  <!-- Central Shield -->
  <path d="M 100 45 L 132 58 C 132 92 118 118 100 134 C 82 118 68 92 68 58 Z" fill="url(#shieldGrad)" opacity="0.85" filter="url(#glow)"/>
  <path d="M 100 52 L 126 63 C 126 91 114 112 100 126 C 86 112 74 91 74 63 Z" fill="none" stroke="#ffffff" stroke-width="1.8" opacity="0.9"/>

  <!-- Satellite Icon Top Right -->
  <g transform="translate(142, 42) rotate(22)">
    <rect x="-8" y="-6" width="16" height="12" rx="2" fill="#38bdf8" stroke="#ffffff" stroke-width="1.2"/>
    <line x1="-18" y1="0" x2="-8" y2="0" stroke="#4ade80" stroke-width="2"/>
    <rect x="-24" y="-8" width="6" height="16" fill="#22c55e" rx="1"/>
    <line x1="8" y1="0" x2="18" y2="0" stroke="#4ade80" stroke-width="2"/>
    <rect x="18" y="-8" width="6" height="16" fill="#22c55e" rx="1"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffffff"/>
  </g>

  <!-- Pulse AI Node Radar Dots -->
  <circle cx="62" cy="115" r="4" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="62" cy="115" r="7" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.7"/>
  
  <circle cx="138" cy="122" r="3.5" fill="#f97316"/>
  <circle cx="100" cy="132" r="3" fill="#22c55e"/>

  <!-- Satellite Signal Pulse Lines -->
  <path d="M 132 55 Q 115 80 100 100" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="3,3"/>
</svg>
